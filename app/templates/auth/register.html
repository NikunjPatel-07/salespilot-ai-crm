<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SalesPilot AI CRM</title>
  <meta name="description" content="Create your SalesPilot AI CRM account." />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>⚡ SalesPilot</h2>
      <p>Create your account</p>
    </div>

    {% if error %}
    <div class="alert alert-error" data-auto-dismiss>{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register-form" id="register-form">
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input id="full_name" type="text" name="full_name" placeholder="Jane Smith" required autofocus />
      </div>
      <div class="form-group">
        <label for="email">Work email</label>
        <input id="email" type="email" name="email" placeholder="jane@company.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="min 8 characters" minlength="8" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.7rem;">
        Create Account
      </button>
    </form>

    <p style="margin-top:1.25rem;text-align:center;font-size:0.85rem;color:var(--muted);">
      Already have an account? <a href="/auth/login">Sign in</a>
    </p>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
