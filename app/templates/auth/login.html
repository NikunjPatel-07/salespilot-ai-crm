<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SalesPilot AI CRM</title>
  <meta name="description" content="Sign in to SalesPilot AI CRM to manage your sales pipeline." />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>⚡ SalesPilot</h2>
      <p>Sign in to your workspace</p>
    </div>

    {% if error %}
    <div class="alert alert-error" data-auto-dismiss>{{ error }}</div>
    {% endif %}

    {% if request.query_params.get('registered') %}
    <div class="alert alert-success" data-auto-dismiss>Account created! Please sign in.</div>
    {% endif %}

    <form method="POST" action="/auth/login" id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" name="email" placeholder="you@company.com" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.7rem;">
        Sign In
      </button>
    </form>

    <p style="margin-top:1.25rem;text-align:center;font-size:0.85rem;color:var(--muted);">
      Don't have an account? <a href="/auth/register">Create one</a>
    </p>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
